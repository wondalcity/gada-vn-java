server:
  port: ${PORT:8080}
  servlet:
    session:
      tracking-modes: cookie

spring:
  application:
    name: gada-admin
  security:
    user:
      name: ignored  # We use custom auth
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gada}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 10000

  mail:
    host: ${MAIL_HOST:email-smtp.ap-southeast-1.amazonaws.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000

gada:
  admin:
    api-base-url: ${API_BASE_URL:http://localhost:7001/v1}
    api-admin-key: ${ADMIN_SERVICE_KEY:local-dev-admin-service-key-000000000000}
    mail-from: ${MAIL_FROM:noreply@gada.vn}
    mail-enabled: ${MAIL_ENABLED:false}
