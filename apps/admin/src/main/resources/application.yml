server:
  port: ${PORT:8080}
  servlet:
    session:
      tracking-modes: cookie

spring:
  application:
    name: gada-admin
  security:
    user:
      name: ignored  # We use custom auth
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gada}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 10000

gada:
  admin:
    api-base-url: ${API_BASE_URL:http://localhost:7001/v1}
    api-admin-key: ${ADMIN_SERVICE_KEY:}
