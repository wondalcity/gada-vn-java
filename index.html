.info-dist::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--yellow); flex-shrink:0; }

.info-btn { flex:1; padding:13px 10px; border-radius:11px; border:none; font-family:'Pretendard',sans-serif; font-size:14px; font-weight:600; cursor:pointer; text-align:center; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:5px; transition:background 0.18s, color 0.18s, transform 0.12s, box-shadow 0.18s; }

.info-btn.secondary:hover { background:var(--bg4); border-color:rgba(255,255,255,0.2); color:#fff; transform:translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,0.3); }
.info-btn-gada {

  color:#0A1020; cursor:pointer; text-decoration:none;

/* ─── Loading Overlay ─────────────────────────────────────────────────── */
#loadingOverlay {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:0; z-index:999; transition:opacity 0.5s;
}
.loader-emblem {
  width:80px; height:80px;
  background:linear-gradient(135deg, var(--blue) 0%, var(--blue-deep) 100%);
  border-radius:20px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 60px rgba(6,105,247,0.4);
  margin-bottom:28px;
  animation:emblem-in 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  position:relative; overflow:hidden;
}
.loader-emblem::before {
  content:'⛑'; font-size:36px; position:relative; z-index:1;
}
.loader-emblem::after {
  content:''; position:absolute; inset:0;
  background:conic-gradient(from 0deg, transparent, rgba(255,199,44,0.3), transparent 120deg);
  animation:spin-conic 2s linear infinite;
}
@keyframes emblem-in { from { opacity:0; transform:scale(0.6) rotate(-10deg); } }
.loader-title {
  font-family:'Pretendard',sans-serif;
  font-size:36px; font-weight:800; letter-spacing:-1px; color:var(--text);
  opacity:0; animation:fade-up 0.5s forwards 0.4s;
  margin-bottom:6px;
}
.loader-title span { color:var(--yellow); }
.loader-sub {
  font-family:'Pretendard',sans-serif; font-size:12px; font-weight:500; color:var(--text-muted);
  letter-spacing:0.5px; opacity:0; animation:fade-up 0.5s forwards 0.6s;
  margin-bottom:32px;
}
.loader-track { width:220px; height:3px; background:var(--bg3); border-radius:2px; overflow:hidden; opacity:0; animation:fade-up 0.5s forwards 0.7s; }
.loader-fill { height:100%; width:0; border-radius:2px; background:linear-gradient(90deg, var(--blue), var(--yellow)); animation:load-fill 1.6s ease-out forwards 0.8s; }
@keyframes load-fill { to { width:100%; } }
@keyframes fade-up { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ─── No-location Banner ──────────────────────────────────────────────── */
#noloc-banner {
  position:fixed; bottom:24px; left:calc(var(--panel-w) + 20px);

}
#noloc-banner.type-error { border:1px solid rgba(255,80,80,0.4); }
#noloc-banner.type-info  { border:1px solid rgba(6,105,247,0.3); }
@keyframes slide-up { from { opacity:0; transform:translateY(16px); } }
#noloc-banner.hide { animation:slide-down 0.3s forwards; }
@keyframes slide-down { to { opacity:0; transform:translateY(16px); } }
.noloc-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

.type-error .noloc-text strong { color:#FF8080; }
.type-info  .noloc-text strong { color:var(--text); }
#noloc-banner button { margin-left:auto; flex-shrink:0; background:transparent; border:none; color:var(--text-muted); font-size:16px; cursor:pointer; padding:4px; }


/* ─── 기관 찾기 버튼 (공통) ───────────────────────────────────────────── */

.panel-header-bar {
  display:flex; align-items:center; justify-content:space-between;

}
.panel-header-bar .panel-title {

#panelBackdrop {

  'S등급':  { bg:'rgba(255,199,44,0.08)', color:'#E6A800', dot:'#E6A800', short:'S' },
  'A등급':  { bg:'rgba(6,105,247,0.12)',  color:'#0669F7', dot:'#0669F7', short:'A' },
  'B등급':  { bg:'rgba(6,105,247,0.07)',  color:'#4A9AFF', dot:'#4A9AFF', short:'B' },
  'C등급':  { bg:'rgba(255,255,255,0.04)',color:'#5A6A8A', dot:'#5A6A8A', short:'C' },
  'D등급':  { bg:'rgba(220,50,50,0.1)',   color:'#E05A5A', dot:'#E05A5A', short:'D' },
  '신규':   { bg:'rgba(100,180,255,0.1)', color:'#64B4FF', dot:'#64B4FF', short:'NEW' },
};

// ─── State ─────────────────────────────────────────────────────────────────
let map, userMarker, distCircle, infoWin;
let userPos = null;
let markers = [];
let activeIndex = null;
let filteredData = [];
let filters = { grade:'all', frg:'all', search:'', dist:30 };

// ─── Helpers ───────────────────────────────────────────────────────────────
function haversine(lat1,lng1,lat2,lng2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.asin(Math.sqrt(a));
}

function gradeBadge(grade) {
  const g = GRADE[grade] || GRADE['C등급'];
  return `<span class="grade-badge" style="background:${g.bg};color:${g.color}">${g.short}</span>`;
}

function markerIcon(grade, active) {
  const g = GRADE[grade] || GRADE['C등급'];
  const col = g.dot;
  const sz = active ? 52 : 38;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${sz}" height="${sz+10}" viewBox="0 0 40 50">
    <filter id="d"><feDropShadow dx="0" dy="3" stdDeviation="${active?3:2}" flood-opacity="0.5"/></filter>
    <path d="M20 1C11.72 1 5 7.72 5 16c0 11 15 33 15 33S35 27 35 16C35 7.72 28.28 1 20 1z" fill="${col}" filter="url(#d)" opacity="${active?1:0.9}"/>
    <circle cx="20" cy="16" r="7" fill="white" opacity="${active?0.95:0.85}"/>
  </svg>`;
  return {
    url: `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`,
    scaledSize: new google.maps.Size(sz, sz+10),
    anchor: new google.maps.Point(sz/2, sz+10),
  };
}

// ─── Apply filters ─────────────────────────────────────────────────────────
function applyFilters() {
  filteredData = INSTITUTIONS.map((inst,i) => ({
    ...inst, _i:i,
    dist: userPos ? haversine(userPos.lat,userPos.lng,inst.lat,inst.lng) : null,
  })).filter(inst => {
    if (filters.grade !== 'all' && inst.grade !== filters.grade) return false;
    if (filters.frg   !== 'all' && inst.frgEdu !== filters.frg)  return false;
    if (filters.search && !inst.name.includes(filters.search))    return false;
    if (userPos && inst.dist > filters.dist)                       return false;
    return true;
  }).sort((a,b) => a.dist !== null ? a.dist - b.dist : 0);

  renderList();
  renderMarkers();
  document.getElementById('resultCount').textContent = filteredData.length;
  document.getElementById('statNearby').textContent  = userPos ? filteredData.length : '—';
  const fbc = document.getElementById('findBtnCount');
  if (fbc) fbc.textContent = filteredData.length;
}

// ─── Render list ───────────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('resultsList');
  if (!filteredData.length) {
    el.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span>조건에 맞는 기관이 없습니다</span></div>`;
    return;
  }
  el.innerHTML = filteredData.map((inst,rank) => `
    <div class="result-card ${activeIndex===inst._i?'active':''}" data-idx="${inst._i}" onclick="selectCard(${inst._i})">
      <span class="rank">#${rank+1}</span>
      <div class="card-top">
        <div class="card-name">${inst.name}</div>
        ${gradeBadge(inst.grade)}
      </div>
      <div class="card-meta">
        <div class="card-row">
          <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span style="word-break:keep-all;overflow-wrap:break-word">${inst.address}</span>
        </div>
        <div class="card-row">
          <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.57a16 16 0 0 0 6.29 6.29l1.94-1.94a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          <span>${inst.phone}</span>
        </div>
      </div>
      ${inst.dist!==null ? `<div class="card-dist">${inst.dist.toFixed(1)} km 거리</div>` : ''}
    </div>`).join('');
}

// ─── Render markers ────────────────────────────────────────────────────────
function renderMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
  const visible = new Set(filteredData.map(d => d._i));
  INSTITUTIONS.forEach((inst,i) => {
    const isVisible = visible.has(i);
    const isActive  = activeIndex === i;
    const m = new google.maps.Marker({
      position: { lat:inst.lat, lng:inst.lng },
      map, title:inst.name,
      icon:    markerIcon(inst.grade, isActive),
      opacity: isVisible ? 1 : 0.12,
      zIndex:  isActive ? 1000 : (isVisible ? 10 : 1),
    });
    m.addListener('click', () => selectCard(i));
    markers.push(m);
  });
}

// ─── Select card ───────────────────────────────────────────────────────────
function selectCard(idx) {
  activeIndex = idx;
  const inst = INSTITUTIONS[idx];
  const dist = userPos ? haversine(userPos.lat,userPos.lng,inst.lat,inst.lng) : null;

  // list sync
  document.querySelectorAll('.result-card').forEach(c => c.classList.remove('active'));
  const card = document.querySelector(`.result-card[data-idx="${idx}"]`);
  if (card) { card.classList.add('active'); card.scrollIntoView({ behavior:'smooth', block:'nearest' }); }

  renderMarkers();

  // info window
  if (infoWin) infoWin.close();
  const g = GRADE[inst.grade] || GRADE['C등급'];
  const websiteBtn = inst.website ? `<a class="info-btn secondary" href="${inst.website}" target="_blank">🌐 홈페이지</a>` : '';
  const distBlock = dist ? `<div class="info-dist">${dist.toFixed(1)} km 거리</div>` : '';
  const content = `<div class="info-popup">
    <div class="info-name">${inst.name}</div>
    <div class="info-badges">
      <span class="info-badge" style="background:${g.bg};color:${g.color}">${inst.grade}</span>
      <span class="info-badge" style="background:rgba(255,255,255,0.05);color:#5A6A8A">${inst.region}</span>
      ${inst.frgEdu==='참여'?'<span class="info-badge" style="background:rgba(6,105,247,0.1);color:#4A9AFF">외국어교육</span>':''}
    </div>
    <div class="info-row"><span class="info-icon">📍</span><span>${inst.address}</span></div>
    <div class="info-row"><span class="info-icon">📞</span><span>${inst.phone}</span></div>
    ${distBlock}
    <div class="info-actions">
      <a class="info-btn primary" href="tel:${inst.phone}">📞 전화하기</a>
      ${websiteBtn}
    </div>
    <a class="info-btn-gada" href="https://gada.worksmate.co.kr/@gada/construction_edu_rearch?ad_creative=apply&ad_group=worker&campaign=landing&content=marker&og_tag_id=423344473&routing_short_id=1smh53l&tracking_template_id=88065b9adce88bd1b72c078df12726eb&ad_type=click" target="_blank">
      <span class="info-btn-gada-top">안전교육 수료 후 일자리를 찾고 있다면</span>
      <div class="info-btn-gada-bottom">
        <img class="info-btn-gada-logo" src="gada-logo.png" alt="가다">
        <span class="info-btn-gada-text">에서 일자리 찾기 →</span>
      </div>
    </a>
  </div>`;

  const isMobile = window.innerWidth < 768;
  const popupMaxW = isMobile ? Math.min(window.innerWidth - 24, 400) : 380;
  infoWin = new google.maps.InfoWindow({ content, disableAutoPan:true, maxWidth: popupMaxW });
  infoWin.open(map, markers[idx]);

  // InfoWindow DOM 렌더 후 실제 위치 기반으로 pan
  google.maps.event.addListenerOnce(infoWin, 'domready', () => {
    // 잠깐 대기 후 DOM 위치 읽기 (Maps가 위치 확정 후)
    setTimeout(() => {
      const iw = document.querySelector('.gm-style-iw-c');
      if (!iw) return;

      const rect    = iw.getBoundingClientRect();
      const topbarH = 64;
      const panelW  = (window.innerWidth >= 769) ? 400 : 0;
      const pad     = 12; // 여백

      let dx = 0, dy = 0;

      if (rect.top    < topbarH + pad)           dy = rect.top    - topbarH - pad;
      if (rect.bottom > window.innerHeight - pad) dy = rect.bottom - window.innerHeight + pad;
      if (rect.left   < panelW + pad)             dx = rect.left   - panelW  - pad;
      if (rect.right  > window.innerWidth - pad)  dx = rect.right  - window.innerWidth  + pad;

      if (dx !== 0 || dy !== 0) map.panBy(dx, dy);
    }, 80);
  });
}

// ─── 위치 성공 처리 ─────────────────────────────────────────────────────────
function onLocationSuccess(pos) {
  userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };

  const dotSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="72" height="82" viewBox="0 0 72 82">
    <circle cx="36" cy="36" r="32" fill="rgba(6,105,247,0.12)" stroke="rgba(6,105,247,0.35)" stroke-width="1.5"/>
    <circle cx="36" cy="36" r="20" fill="white" stroke="white" stroke-width="3"/>
    <circle cx="36" cy="36" r="17" fill="#0669F7"/>
    <circle cx="36" cy="36" r="6" fill="white"/>
    <rect x="8" y="60" width="56" height="18" rx="9" fill="#0669F7"/>
    <text x="36" y="73" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="white">검색위치</text>
  </svg>`;
  const dotIcon = {
    url: `data:image/svg+xml;charset=utf-8,${encodeURIComponent(dotSvg)}`,
    scaledSize: new google.maps.Size(72, 82),
    anchor: new google.maps.Point(36, 36),
  };
  if (userMarker) {
    userMarker.setPosition(userPos);
    userMarker.setIcon(dotIcon);
    userMarker.setMap(map);
  } else {
    userMarker = new google.maps.Marker({ position: userPos, map, title: '검색 위치', zIndex: 9999, icon: dotIcon });
  }

  if (distCircle) distCircle.setMap(null);
  drawDistCircle();
  map.setOptions({ center: new google.maps.LatLng(userPos.lat, userPos.lng), zoom: 13 });
  applyFilters();
}

// ─── 주소 기반 주변 검색 (Google Geocoding API) ─────────────────────────────
const GEOCODING_KEY = 'AIzaSyAYjES_dfbpGBJrCCUYTio-gqhW_418nWA';

async function searchByAddress() {
  const input = document.getElementById('addrInput');
  const btn = document.getElementById('addrSearchBtn');
  const addr = input.value.trim();
  if (!addr) {
    showBanner('주소를 입력해주세요.', 'error');
    input.focus();
    return;
  }
  btn.classList.add('searching');
  btn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9"/></svg> 검색 중...`;
  btn.disabled = true;

  function resetSearchBtn() {
    btn.classList.remove('searching');
    btn.innerHTML = `<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> 주변 검색`;
    btn.disabled = false;
  }

  try {
    const url = `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(addr)}&region=KR&language=ko&key=${GEOCODING_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    resetSearchBtn();
    if (data.status === 'OK' && data.results.length > 0) {
      const loc = data.results[0].geometry.location;
      onLocationSuccess({ coords: { latitude: loc.lat, longitude: loc.lng } });
    } else {
      showBanner('주소를 찾을 수 없습니다. 더 상세한 주소를 입력해주세요.', 'error');
    }
  } catch (e) {
    resetSearchBtn();
    showBanner('주소 검색 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.', 'error');
  }
}

function drawDistCircle() {
  if (!userPos) return;
  if (distCircle) distCircle.setMap(null);
  distCircle = new google.maps.Circle({
    map, center:userPos, radius:filters.dist*1000,
    fillColor:'#0669F7', fillOpacity:0.04,
    strokeColor:'#0669F7', strokeOpacity:0.25, strokeWeight:1.5,
  });
}

function showBanner(msg, type='error') {
  document.getElementById('noloc-banner')?.remove();
  const el = document.createElement('div');
  el.id = 'noloc-banner';
  el.className = `type-${type}`;
  const title = type === 'error' ? '위치 오류' : '위치 안내';
  el.innerHTML = `<div class="noloc-dot"></div><div class="noloc-text"><strong>${title}</strong>${msg}</div><button onclick="this.parentElement.classList.add('hide');setTimeout(()=>this.parentElement.remove(),300)">✕</button>`;
  document.body.appendChild(el);
  setTimeout(()=>{ el.classList.add('hide'); setTimeout(()=>el.remove(),300); }, 6000);
}

// ─── Filter events ─────────────────────────────────────────────────────────
document.querySelectorAll('#gradeFilter .chip').forEach(btn =>
  btn.addEventListener('click', () => {
    document.querySelectorAll('#gradeFilter .chip').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active'); filters.grade = btn.dataset.grade; applyFilters();
  })
);
document.querySelectorAll('#frgFilter .chip').forEach(btn =>
  btn.addEventListener('click', () => {
    document.querySelectorAll('#frgFilter .chip').forEach(c=>c.classList.remove('active'));
    btn.classList.add('active'); filters.frg = btn.dataset.frg; applyFilters();
  })
);
document.getElementById('searchInput').addEventListener('input', e => {
  filters.search = e.target.value.trim(); applyFilters();
});
const slider = document.getElementById('distSlider');
slider.addEventListener('input', () => {
  filters.dist = +slider.value;
  document.getElementById('distVal').textContent = `${filters.dist} km`;
  const pct = ((filters.dist-1)/99*100).toFixed(1);
  slider.style.setProperty('--pct', `${pct}%`);
  drawDistCircle(); applyFilters();
});
slider.style.setProperty('--pct','29.3%');
// ─── Panel open/close ──────────────────────────────────────────────────────
function openPanel() {
  document.getElementById('panel').classList.add('open');
  document.getElementById('panelBackdrop').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('panelBackdrop').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('addrSearchBtn').addEventListener('click', searchByAddress);
document.getElementById('addrInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchByAddress();
});
document.getElementById('menuToggle')?.addEventListener('click', openPanel);

// ─── Map init ──────────────────────────────────────────────────────────────
window.initMap = function() {
  const koreaBounds = new google.maps.LatLngBounds(
    { lat:32.0, lng:123.0 },
    { lat:43.5, lng:133.5 }
  );
  map = new google.maps.Map(document.getElementById('map'), {
    center:{ lat:36.0, lng:127.7 }, zoom:8,
    gestureHandling:'greedy',
    restriction:{ latLngBounds:koreaBounds, strictBounds:false },
    minZoom:6,
  });

  map.addListener('click', () => {
    if (infoWin) infoWin.close();
    activeIndex = null;
    document.querySelectorAll('.result-card').forEach(c=>c.classList.remove('active'));
    renderMarkers();
  });

  applyFilters();

  setTimeout(() => {
    const ov = document.getElementById('loadingOverlay');
    ov.style.opacity = '0';
    setTimeout(() => ov.remove(), 500);
  }, 2000);
};
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBA0QSmBP8r5rV6vEI3CZlnpwwGZ0F21LY&language=ko&callback=initMap"></script>
