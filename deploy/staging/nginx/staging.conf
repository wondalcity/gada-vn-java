# GADA VN — Nginx staging config
# Port 80:   API (/v1/) + Web (Next.js, catch-all)
# Port 8080: Admin panel

upstream api  { server api:7001;  keepalive 16; }
upstream web  { server web:3000;  keepalive 16; }
upstream admin { server admin:8081; keepalive 16; }

# ── Port 80: Web + API ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options        SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff   always;
    add_header X-XSS-Protection       "1; mode=block" always;

    # Request size limit (S3 multipart goes directly, so 10MB is safe here)
    client_max_body_size 10m;

    # ── Spring Boot API (/v1/) ────────────────────────────────────────────────
    location /v1/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Connection     "";
        proxy_set_header   Host           $host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Pass through 4xx/5xx as-is (Spring Boot returns structured JSON errors)
        proxy_intercept_errors off;
    }

    # ── Next.js Web (catch-all) ───────────────────────────────────────────────
    location / {
        proxy_pass         http://web;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;

        # Cache Next.js static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            proxy_pass http://web;
            proxy_cache_valid 200 1d;
            add_header Cache-Control "public, max-age=86400, immutable";
        }
    }

    # ── Health check endpoint for load balancer / monitoring ─────────────────
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

# ── Port 8080: Admin Panel ───────────────────────────────────────────────────
server {
    listen 8080;
    server_name _;

    add_header X-Frame-Options        DENY      always;
    add_header X-Content-Type-Options nosniff   always;

    client_max_body_size 5m;

    location / {
        proxy_pass         http://admin;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        # Use $http_host (includes port) so Spring Boot generates correct redirect URLs
        # e.g. http://host:8080/login instead of http://host/login
        proxy_set_header   Host           $http_host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Port 8080;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;

        # Pass through all status codes from Spring Boot (incl. 502 from proxy errors)
        proxy_intercept_errors off;
    }
}
