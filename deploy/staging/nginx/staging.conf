# GADA VN — Nginx staging config (HTTP fallback — used before SSL is set up)
# For HTTPS, run setup-ssl.sh which generates this file from staging.conf.template
# Port 80:   API (/v1/) + Web (Next.js, catch-all)
# Port 8080: Admin panel

# api upstream: stable long-running container, keepalive is safe
upstream api  { server api:7001;  keepalive 16; }
# web/admin use resolver+variable to re-resolve Docker DNS on each deploy restart

# ── Port 80: Web + API ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    # Docker internal DNS — re-resolves container IPs dynamically (prevents 502 after redeploy)
    resolver 127.0.0.11 valid=30s;

    # Security headers
    # COOP: allow-popups is required for Firebase Google/Facebook OAuth popups
    add_header Cross-Origin-Opener-Policy   "same-origin-allow-popups" always;
    add_header X-Frame-Options              SAMEORIGIN                 always;
    add_header X-Content-Type-Options       nosniff                    always;
    add_header X-XSS-Protection             "1; mode=block"            always;

    # Request size limit (S3 multipart goes directly, so 10MB is safe here)
    client_max_body_size 10m;

    # ── Spring Boot API (/v1/) ────────────────────────────────────────────────
    location /v1/ {
        proxy_pass         http://api;
        proxy_http_version 1.1;
        proxy_set_header   Connection     "";
        proxy_set_header   Host           $host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        # Pass through 4xx/5xx as-is (Spring Boot returns structured JSON errors)
        proxy_intercept_errors off;
    }

    # ── Next.js Web (catch-all) ───────────────────────────────────────────────
    location / {
        set $web_upstream http://web:3000;
        proxy_pass         $web_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host $host;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ── Health check endpoint for load balancer / monitoring ─────────────────
    location /nginx-health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}

# ── Port 8080: Admin Panel ───────────────────────────────────────────────────
server {
    listen 8080;
    server_name _;
    resolver 127.0.0.11 valid=30s;

    add_header X-Frame-Options        DENY      always;
    add_header X-Content-Type-Options nosniff   always;

    client_max_body_size 5m;

    location / {
        set $admin_upstream http://admin:8081;
        proxy_pass         $admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        # Use $http_host (includes port) so Spring Boot generates correct redirect URLs
        # e.g. http://host:8080/login instead of http://host/login
        proxy_set_header   Host           $http_host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Port 8080;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;

        # Pass through all status codes from Spring Boot (incl. 502 from proxy errors)
        proxy_intercept_errors off;
    }
}
