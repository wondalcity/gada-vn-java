name: Mobile Build & Distribute

on:
  push:
    branches: [main, staging]
    paths:
      - 'apps/mobile/**'
      - 'packages/core/**'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: ''

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d \
            > apps/mobile/android/gada-release.keystore

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          NOTES="${{ github.event.inputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Branch: ${{ github.ref_name }} | SHA: ${GITHUB_SHA::8}"
          fi
          npx --yes firebase-tools appdistribution:distribute \
            apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
            --app "1:359319234631:android:199915ce689bcad8c0a962" \
            --release-notes "$NOTES" \
            --groups "internal-testers"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
