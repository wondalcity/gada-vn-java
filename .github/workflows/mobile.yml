name: Mobile Build (EAS)

on:
  push:
    branches: [main, staging]
    paths:
      - 'apps/mobile/**'
      - 'packages/core/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform'
        required: true
        default: 'android'
        type: choice
        options: [all, ios, android]
      profile:
        description: 'Build profile'
        required: true
        default: 'preview'
        type: choice
        options: [preview, production]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine build profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PROFILE="${{ github.event.inputs.profile }}"
            PLATFORM="${{ github.event.inputs.platform }}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            PROFILE="production"
            PLATFORM="all"
          else
            PROFILE="preview"
            PLATFORM="android"
          fi
          echo "build_profile=$PROFILE" >> $GITHUB_OUTPUT
          echo "platform=$PLATFORM"     >> $GITHUB_OUTPUT

      - name: Build
        id: build
        working-directory: apps/mobile
        run: |
          eas build \
            --platform ${{ steps.profile.outputs.platform }} \
            --profile ${{ steps.profile.outputs.build_profile }} \
            --non-interactive \
            --json 2>/dev/null \
            | tee /tmp/eas-build-output.json
          APK_URL=$(jq -r '.[] | select(.platform == "ANDROID") | .artifacts.buildUrl // empty' /tmp/eas-build-output.json 2>/dev/null | head -1)
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT

      # ── Firebase App Distribution (preview builds only) ───────────────────
      - name: Upload to Firebase App Distribution
        if: steps.profile.outputs.build_profile == 'preview' && steps.build.outputs.apk_url != ''
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          curl -fsSL "${{ steps.build.outputs.apk_url }}" -o app-preview.apk
          npx --yes firebase-tools appdistribution:distribute app-preview.apk \
            --app "1:359319234631:android:199915ce689bcad8c0a962" \
            --release-notes "Branch: ${{ github.ref_name }} | SHA: ${{ github.sha }}" \
            --groups "internal-testers"
