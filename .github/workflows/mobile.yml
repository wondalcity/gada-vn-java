name: Mobile Build & Distribute

on:
  push:
    branches: [main, staging]
    paths:
      - 'apps/mobile/**'
      - 'packages/core/**'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: ''

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump versionCode (run_number + offset)
        id: version
        run: |
          BASE=$(node -p "require('./apps/mobile/app.json').expo.android.versionCode")
          # Use whichever is larger: current app.json value or run_number+offset
          # Offset = 57 so CI builds never collide with manually-bumped builds
          CI_CODE=$(( ${{ github.run_number }} + 57 ))
          VERSION_CODE=$(( CI_CODE > BASE ? CI_CODE : BASE + 1 ))
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('apps/mobile/app.json', 'utf8'));
            j.expo.android.versionCode = $VERSION_CODE;
            fs.writeFileSync('apps/mobile/app.json', JSON.stringify(j, null, 2) + '\n');
          "
          echo "versionCode set to $VERSION_CODE"

      - name: Write google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d \
            > apps/mobile/google-services.json

      - name: Generate native Android project (expo prebuild)
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_APP_ENV: staging
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Pin Gradle to 8.6 (expo-modules-core incompatible with 8.8+)
        run: |
          sed -i 's|gradle-[0-9.]*-all|gradle-8.6-all|g' \
            apps/mobile/android/gradle/wrapper/gradle-wrapper.properties
          grep distributionUrl apps/mobile/android/gradle/wrapper/gradle-wrapper.properties

      - name: Patch settings.gradle with resolved module paths
        working-directory: apps/mobile
        run: |
          # Gradle's Java Process.exec() doesn't reliably resolve pnpm workspace packages.
          # We compute the absolute paths in the shell (which works correctly) and
          # hard-code them directly into settings.gradle so Gradle never needs to spawn node.
          RN_PKG=$(node --print "require.resolve('react-native/package.json')")
          RN_DIR=$(dirname "$RN_PKG")
          GRADLE_PLUGIN_PKG=$(node --print "require.resolve('@react-native/gradle-plugin/package.json', { paths: ['$RN_DIR'] })")
          EXPO_PKG=$(node --print "require.resolve('expo/package.json')")
          CLI_ANDROID_PKG=$(node --print "require.resolve('@react-native-community/cli-platform-android/package.json', { paths: ['$RN_DIR'] })" 2>/dev/null || echo "")

          echo "RN_PKG=$RN_PKG"
          echo "RN_DIR=$RN_DIR"
          echo "GRADLE_PLUGIN_PKG=$GRADLE_PLUGIN_PKG"
          echo "EXPO_PKG=$EXPO_PKG"
          echo "CLI_ANDROID_PKG=$CLI_ANDROID_PKG"

          # In RN 0.74+, native_modules.gradle lives in cli-platform-android, not react-native.
          # Gradle's apply-from in settings.gradle looks for it relative to the react-native dir,
          # so we symlink it there if it doesn't already exist.
          if [ ! -f "$RN_DIR/native_modules.gradle" ] && [ -n "$CLI_ANDROID_PKG" ]; then
            CLI_ANDROID_DIR=$(dirname "$CLI_ANDROID_PKG")
            ln -sf "$CLI_ANDROID_DIR/native_modules.gradle" "$RN_DIR/native_modules.gradle"
            echo "Symlinked native_modules.gradle: $CLI_ANDROID_DIR/native_modules.gradle -> $RN_DIR/native_modules.gradle"
          fi

          python3 scripts/patch_settings_gradle.py "$RN_PKG" "$GRADLE_PLUGIN_PKG" "$EXPO_PKG" "$CLI_ANDROID_PKG"

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d \
            > apps/mobile/android/app/gada-release.keystore

      - name: Print release keystore SHA-1 (for Firebase Console registration)
        run: |
          keytool -list -v \
            -keystore apps/mobile/android/app/gada-release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            2>/dev/null | grep -E "SHA1:|SHA-1:" | head -3

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_APP_ENV: staging
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          NOTES="${{ github.event.inputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            VERSION_CODE=${{ steps.version.outputs.version_code }}
            COMMITS=$(git log --pretty=format:"- %s" -5)
            NOTES=$(printf '[versionCode %s] %s @ %s\n\n%s' \
              "$VERSION_CODE" "${{ github.ref_name }}" "${GITHUB_SHA::8}" "$COMMITS")
          fi
          npx --yes firebase-tools appdistribution:distribute \
            apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
            --app "1:359319234631:android:199915ce689bcad8c0a962" \
            --testers "kyle@worksmate.co.kr,wondalcity@gmail.com" \
            --release-notes "$NOTES"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Write GoogleService-Info.plist
        run: echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}" | base64 -d > apps/mobile/GoogleService-Info.plist

      - name: Generate native iOS project (expo prebuild)
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          EXPO_PUBLIC_APP_ENV: staging
        run: npx expo prebuild --platform ios --non-interactive --clean

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: apps/mobile/ios/Pods
          key: pods-${{ hashFiles('apps/mobile/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: pod install --repo-update

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 -d > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/cert.p12

      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_PROVISIONING_PROFILE" | base64 -d > /tmp/build.mobileprovision
          # Get UUID from profile and use it as filename
          PROFILE_UUID=$(security cms -D -i /tmp/build.mobileprovision | plutil -extract UUID raw -)
          cp /tmp/build.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          # Get profile name
          PROFILE_NAME=$(security cms -D -i /tmp/build.mobileprovision | plutil -extract Name raw -)
          echo "PROFILE_NAME=$PROFILE_NAME" >> $GITHUB_ENV
          rm /tmp/build.mobileprovision

      - name: Patch ExportOptions.plist
        run: |
          sed -i \
            -e "s/__APPLE_TEAM_ID__/${{ secrets.APPLE_TEAM_ID }}/g" \
            -e "s/__PROVISIONING_PROFILE_NAME__/$PROFILE_NAME/g" \
            apps/mobile/ExportOptions.plist
          cp apps/mobile/ExportOptions.plist apps/mobile/ios/ExportOptions.plist

      - name: Bump build number
        run: |
          BASE=$(node -p "require('./apps/mobile/app.json').expo.ios.buildNumber")
          CI_CODE=$(( ${{ github.run_number }} + 57 ))
          BUILD_NUMBER=$(( CI_CODE > BASE ? CI_CODE : BASE + 1 ))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" \
            apps/mobile/ios/GADAVN2/Info.plist 2>/dev/null || true

      - name: Build iOS archive
        working-directory: apps/mobile/ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -workspace GADAVN2.xcworkspace \
            -scheme GADAVN2 \
            -configuration Release \
            -archivePath ./build/GADAVN2.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            -allowProvisioningUpdates \
            | xcpretty || true

      - name: Export IPA
        working-directory: apps/mobile/ios
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/GADAVN2.xcarchive \
            -exportOptionsPlist ../ExportOptions.plist \
            -exportPath ./build/ipa \
            | xcpretty || true

      - name: Upload to Firebase App Distribution (iOS)
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          NOTES="${{ github.event.inputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            COMMITS=$(git log --pretty=format:"- %s" -5)
            NOTES=$(printf '[build %s] %s @ %s\n\n%s' \
              "$BUILD_NUMBER" "${{ github.ref_name }}" "${GITHUB_SHA::8}" "$COMMITS")
          fi
          npx --yes firebase-tools appdistribution:distribute \
            apps/mobile/ios/build/ipa/GADAVN2.ipa \
            --app "1:359319234631:ios:e83c148da4b8c2a5c0a962" \
            --testers "kyle@worksmate.co.kr,wondalcity@gmail.com" \
            --release-notes "$NOTES"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GADAVN2-${{ github.sha }}.ipa
          path: apps/mobile/ios/build/ipa/GADAVN2.ipa
          retention-days: 14
