name: Mobile Build & Distribute

on:
  push:
    branches: [main, staging]
    paths:
      - 'apps/mobile/**'
      - 'packages/core/**'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: ''

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Write google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d \
            > apps/mobile/google-services.json

      - name: Generate native Android project (expo prebuild)
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Patch settings.gradle with resolved module paths
        working-directory: apps/mobile
        run: |
          # Gradle's Java Process.exec() doesn't reliably resolve pnpm workspace packages.
          # We compute the absolute paths in the shell (which works correctly) and
          # hard-code them directly into settings.gradle so Gradle never needs to spawn node.
          RN_PKG=$(node --print "require.resolve('react-native/package.json')")
          RN_DIR=$(dirname "$RN_PKG")
          GRADLE_PLUGIN_PKG=$(node --print "require.resolve('@react-native/gradle-plugin/package.json', { paths: ['$RN_DIR'] })")
          EXPO_PKG=$(node --print "require.resolve('expo/package.json')")
          CLI_ANDROID_PKG=$(node --print "require.resolve('@react-native-community/cli-platform-android/package.json', { paths: ['$RN_DIR'] })" 2>/dev/null || echo "")

          echo "RN_PKG=$RN_PKG"
          echo "RN_DIR=$RN_DIR"
          echo "GRADLE_PLUGIN_PKG=$GRADLE_PLUGIN_PKG"
          echo "EXPO_PKG=$EXPO_PKG"
          echo "CLI_ANDROID_PKG=$CLI_ANDROID_PKG"

          # In RN 0.74+, native_modules.gradle lives in cli-platform-android, not react-native.
          # Gradle's apply-from in settings.gradle looks for it relative to the react-native dir,
          # so we symlink it there if it doesn't already exist.
          if [ ! -f "$RN_DIR/native_modules.gradle" ] && [ -n "$CLI_ANDROID_PKG" ]; then
            CLI_ANDROID_DIR=$(dirname "$CLI_ANDROID_PKG")
            ln -sf "$CLI_ANDROID_DIR/native_modules.gradle" "$RN_DIR/native_modules.gradle"
            echo "Symlinked native_modules.gradle: $CLI_ANDROID_DIR/native_modules.gradle -> $RN_DIR/native_modules.gradle"
          fi

          python3 scripts/patch_settings_gradle.py "$RN_PKG" "$GRADLE_PLUGIN_PKG" "$EXPO_PKG" "$CLI_ANDROID_PKG"

      - name: Patch AndroidManifest (fix FCM notification color merge conflict)
        run: |
          # expo-notifications adds default_notification_color without tools:replace,
          # causing a manifest merger conflict with react-native-firebase/messaging.
          MANIFEST=apps/mobile/android/app/src/main/AndroidManifest.xml
          sed -i 's|\(messaging\.default_notification_color"[^>]*\)\/>|\1 tools:replace="android:resource"/>|' "$MANIFEST"
          echo "After patch:"; grep "default_notification_color" "$MANIFEST"

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d \
            > apps/mobile/android/app/gada-release.keystore

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          NOTES="${{ github.event.inputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            VERSION_CODE=$(node -e "console.log(require('./apps/mobile/app.json').expo.android.versionCode)")
            COMMITS=$(git log --pretty=format:"- %s" -5)
            NOTES=$(printf '[versionCode %s] %s @ %s\n\n%s' \
              "$VERSION_CODE" "${{ github.ref_name }}" "${GITHUB_SHA::8}" "$COMMITS")
          fi
          npx --yes firebase-tools appdistribution:distribute \
            apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
            --app "1:359319234631:android:199915ce689bcad8c0a962" \
            --release-notes "$NOTES"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
