name: Mobile Build & Distribute

on:
  push:
    branches: [main, staging]
    paths:
      - 'apps/mobile/**'
      - 'packages/core/**'
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: ''

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Write google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d \
            > apps/mobile/google-services.json

      - name: Generate native Android project (expo prebuild)
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --non-interactive --clean

      - name: Expose node_modules to Gradle settings.gradle
        run: |
          # settings.gradle runs `node --print require.resolve(...)` from android/.
          # pnpm workspace isolation means packages live in apps/mobile/node_modules/,
          # not the root. Create a direct node_modules dir inside android/ so Node
          # finds them without directory traversal (works around pnpm symlink depth issues).
          ANDROID_NM="${{ github.workspace }}/apps/mobile/android/node_modules"
          MOBILE_NM="${{ github.workspace }}/apps/mobile/node_modules"
          mkdir -p "$ANDROID_NM"
          # Hard-link the key packages settings.gradle needs
          ln -sfn "$MOBILE_NM/react-native"              "$ANDROID_NM/react-native"
          ln -sfn "$MOBILE_NM/@react-native"             "$ANDROID_NM/@react-native"
          ln -sfn "$MOBILE_NM/expo"                      "$ANDROID_NM/expo"
          ln -sfn "$MOBILE_NM/expo-modules-autolinking"  "$ANDROID_NM/expo-modules-autolinking"

      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d \
            > apps/mobile/android/gada-release.keystore

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload to Firebase App Distribution
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          NOTES="${{ github.event.inputs.release_notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Branch: ${{ github.ref_name }} | SHA: ${GITHUB_SHA::8}"
          fi
          npx --yes firebase-tools appdistribution:distribute \
            apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
            --app "1:359319234631:android:199915ce689bcad8c0a962" \
            --release-notes "$NOTES" \
            --groups "internal-testers"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.sha }}
          path: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
