name: CI

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main, staging]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ── Detect changes ───────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      admin: ${{ steps.filter.outputs.admin }}
      core: ${{ steps.filter.outputs.core }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/core/**'
              - 'packages/db/**'
            web:
              - 'apps/web-next/**'
              - 'packages/core/**'
            mobile:
              - 'apps/mobile/**'
              - 'packages/core/**'
            admin:
              - 'apps/admin/**'
            core:
              - 'packages/core/**'

  # ── Lint & Type Check ────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo type-check lint --parallel

  # ── API Tests ────────────────────────────────────────────────────────────
  test-api:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api == 'true'
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_DB: gada_vn_test
          POSTGRES_USER: gadaadmin
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter=@gada-vn/core
      - name: Run API tests
        run: pnpm --filter=@gada-vn/api test --coverage
        env:
          DATABASE_URL: postgresql://gadaadmin:testpassword@localhost:5432/gada_vn_test
          NODE_ENV: test

  # ── Web Build Check (web-next) ────────────────────────────────────────────
  test-web:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.web == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web-next
        run: pnpm --filter=@gada/web build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.STAGING_API_BASE_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NEXT_PUBLIC_CDN_DOMAIN: ${{ vars.STAGING_CDN_DOMAIN }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.STAGING_SITE_URL }}

  # ── Build Docker Images ──────────────────────────────────────────────────
  build-images:
    runs-on: ubuntu-latest
    needs: [lint, test-api, test-web]
    if: |
      always() &&
      !cancelled() &&
      (needs.lint.result == 'success') &&
      (needs.test-api.result == 'success' || needs.test-api.result == 'skipped') &&
      (needs.test-web.result == 'success' || needs.test-web.result == 'skipped') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "env_name=production"                      >> $GITHUB_OUTPUT
            echo "api_base_url=${{ vars.PROD_API_BASE_URL }}"     >> $GITHUB_OUTPUT
            echo "cdn_domain=${{ vars.PROD_CDN_DOMAIN }}"         >> $GITHUB_OUTPUT
            echo "site_url=${{ vars.PROD_SITE_URL }}"             >> $GITHUB_OUTPUT
          else
            echo "env_name=staging"                              >> $GITHUB_OUTPUT
            echo "api_base_url=${{ vars.STAGING_API_BASE_URL }}" >> $GITHUB_OUTPUT
            echo "cdn_domain=${{ vars.STAGING_CDN_DOMAIN }}"     >> $GITHUB_OUTPUT
            echo "site_url=${{ vars.STAGING_SITE_URL }}"         >> $GITHUB_OUTPUT
          fi
          echo "image_tag=${{ github.sha }}"                   >> $GITHUB_OUTPUT
          echo "ecr_registry=${{ steps.ecr-login.outputs.registry }}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          target: production
          push: true
          tags: |
            ${{ steps.set-env.outputs.ecr_registry }}/gada-vn-${{ steps.set-env.outputs.env_name }}/api:${{ steps.set-env.outputs.image_tag }}
            ${{ steps.set-env.outputs.ecr_registry }}/gada-vn-${{ steps.set-env.outputs.env_name }}/api:latest
          cache-from: type=registry,ref=${{ steps.set-env.outputs.ecr_registry }}/gada-vn-${{ steps.set-env.outputs.env_name }}/api:latest
          cache-to: type=inline

      - name: Build and push Web image (web-next)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web-next/Dockerfile
          push: true
          tags: |
            ${{ steps.set-env.outputs.ecr_registry }}/gada-vn-${{ steps.set-env.outputs.env_name }}/web:${{ steps.set-env.outputs.image_tag }}
            ${{ steps.set-env.outputs.ecr_registry }}/gada-vn-${{ steps.set-env.outputs.env_name }}/web:latest
          cache-from: type=registry,ref=${{ steps.set-env.outputs.ecr_registry }}/gada-vn-${{ steps.set-env.outputs.env_name }}/web:latest
          cache-to: type=inline
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ steps.set-env.outputs.api_base_url }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ vars.FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ vars.FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ vars.FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ vars.FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_CDN_DOMAIN=${{ steps.set-env.outputs.cdn_domain }}
            NEXT_PUBLIC_SITE_URL=${{ steps.set-env.outputs.site_url }}

      - name: Build and push Admin image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/admin
          push: true
          tags: |
            ${{ steps.set-env.outputs.ecr_registry }}/gada-vn-${{ steps.set-env.outputs.env_name }}/admin:${{ steps.set-env.outputs.image_tag }}
            ${{ steps.set-env.outputs.ecr_registry }}/gada-vn-${{ steps.set-env.outputs.env_name }}/admin:latest
          cache-from: type=registry,ref=${{ steps.set-env.outputs.ecr_registry }}/gada-vn-${{ steps.set-env.outputs.env_name }}/admin:latest
          cache-to: type=inline

  # ── Deploy to Staging ────────────────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/staging'
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1
      - name: Update ECS services
        run: |
          aws ecs update-service --cluster gada-vn-staging-cluster --service gada-vn-staging-api --force-new-deployment
          aws ecs update-service --cluster gada-vn-staging-cluster --service gada-vn-staging-web --force-new-deployment
          aws ecs update-service --cluster gada-vn-staging-cluster --service gada-vn-staging-admin --force-new-deployment
      - name: Wait for services to stabilize
        run: |
          aws ecs wait services-stable --cluster gada-vn-staging-cluster \
            --services gada-vn-staging-api gada-vn-staging-web gada-vn-staging-admin

  # ── Deploy to Production (manual approval) ───────────────────────────────
  deploy-production:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    environment: production  # Has required reviewers in GitHub settings
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-1
      - name: Update ECS services
        run: |
          aws ecs update-service --cluster gada-vn-production-cluster --service gada-vn-production-api --force-new-deployment
          aws ecs update-service --cluster gada-vn-production-cluster --service gada-vn-production-web --force-new-deployment
          aws ecs update-service --cluster gada-vn-production-cluster --service gada-vn-production-admin --force-new-deployment
