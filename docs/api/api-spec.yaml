          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Worker Profile]
      summary: Delete work experience entry
      description: 👷 **Worker** — own only
      security:
        - FirebaseBearer: []
      parameters:
        - name: experienceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Experience deleted
        "403":
          $ref: '#/components/responses/Forbidden'

  # ─────────────────────────────────────────────────────────────
  # MANAGER REGISTRATION
  # ─────────────────────────────────────────────────────────────

  /manager/register:
    post:
      tags: [Manager Registration]
      summary: Submit business registration
      description: |
        🔐 **Authenticated** (any user — worker role sufficient)
        Creates `app.manager_profiles` with `approval_status = pending`.
        Also creates `ops.admin_approvals` record.
        If user already has a pending or approved registration, returns 409.
        A rejected registration can be re-submitted — creates a new row.
      security:
        - FirebaseBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [businessName, representativeName, businessDoc]
              properties:
                businessName:             { type: string, example: "Xây dựng Hưng Phát" }
                businessRegistrationNumber: { type: string, example: "0123456789" }
                businessType:             { type: string, enum: [individual, corporation], example: corporation }
                representativeName:       { type: string, example: "Trần Văn B" }
                representativePhone:      { type: string, example: "+84912345678" }
                businessAddress:          { type: string }
                businessDoc:              { type: string, format: binary, description: "PDF or image, max 10 MB" }
      responses:
        "201":
          description: Registration submitted
          content:
            application/json:
              example:
                statusCode: 201
                data:
                  id: "uuid"
                  approvalStatus: "pending"
                  submittedAt: "2026-03-21T10:00:00Z"
        "409":
          description: Already has active/pending registration
          content:
            application/json:
              example:
                statusCode: 409
                message: "You already have a pending or approved registration."

  /manager/registration/status:
    get:
      tags: [Manager Registration]
      summary: Get own manager registration status
      description: 🔐 **Authenticated**
      security:
        - FirebaseBearer: []
      responses:
        "200":
          description: Current registration
          content:
            application/json:
              example:
                statusCode: 200
                data:
                  approvalStatus: "pending"
                  submittedAt: "2026-03-21T10:00:00Z"
                  reviewedAt: null
                  rejectionReason: null
        "404":
          description: No registration submitted yet
          content:
            application/json:
              example:
                statusCode: 404
                data: null

