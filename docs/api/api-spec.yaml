                descriptionVi:  { type: string }
                tradeId:        { type: integer, example: 3 }
                headcount:      { type: integer, example: 10 }
                wageAmount:     { type: integer, example: 500000 }
                wageType:       { type: string, enum: [daily, hourly, monthly], example: daily }
                startDate:      { type: string, format: date, example: "2026-04-01" }
                endDate:        { type: string, format: date, example: "2026-07-31" }
