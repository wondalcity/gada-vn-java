        Includes schema.org `JobPosting` structured-data-friendly field names.
      parameters:
        - name: provinceId
          in: query
          schema: { type: integer }
          description: Filter by province
        - name: tradeId
          in: query
          schema: { type: integer }
          description: Filter by trade
        - name: startDateFrom
          in: query
          schema: { type: string, format: date }
        - name: startDateTo
          in: query
          schema: { type: string, format: date }
        - name: locale
          in: query
          schema: { type: string, enum: [ko, vi, en], default: ko }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        "200":
          description: Paginated job list
          content:
            application/json:
              example:
                statusCode: 200
                data:
