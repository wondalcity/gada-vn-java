            application/json:
              example:
                statusCode: 201
                data:
                  id: "uuid"
                  slug: "tuyen-tho-moc-phu-my-hung-2026-04"
                  status: "draft"
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

  /manager/jobs/{jobId}:
    get:
      tags: [Jobs]
      summary: Get job detail (manager view)
      description: 🏗️ **Manager** — own job only
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/JobIdParam'
      responses:
        "200":
          description: Full job detail with applicant stats

    put:
      tags: [Jobs]
      summary: Update job posting
      description: |
        🏗️ **Manager** — own job only.
        Only allowed when `status = draft` or `status = open`.
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/JobIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                titleKo:       { type: string }
                titleVi:       { type: string }
                descriptionKo: { type: string }
                descriptionVi: { type: string }
                headcount:     { type: integer }
                wageAmount:    { type: integer }
                endDate:       { type: string, format: date }
      responses:
        "200":
          description: Job updated
        "409":
          description: Cannot edit a closed or filled job

  /manager/jobs/{jobId}/status:
    patch:
      tags: [Jobs]
      summary: Update job status
      description: |
        🏗️ **Manager** — own job. Allowed transitions: `draft→open`, `open→closed`.
        Status changes to `filled` are automated by the system when `accepted_count >= headcount`.
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/JobIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [open, closed] }
            example:
              status: "open"
      responses:
        "200":
          description: Status updated

  /manager/jobs/{jobId}/shifts:
    get:
      tags: [Jobs]
      summary: List job shifts
      description: 🏗️ **Manager** — own job; or 👷 **Worker** (for hired workers on this job)
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/JobIdParam'
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Shift list

    post:
      tags: [Jobs]
      summary: Create job shift
      description: 🏗️ **Manager** — own job
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/JobIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [shiftDate]
              properties:
                shiftDate:  { type: string, format: date, example: "2026-04-07" }
                startTime:  { type: string, example: "07:30" }
                endTime:    { type: string, example: "17:00" }
                headcount:  { type: integer, nullable: true }
                notesKo:    { type: string }
                notesVi:    { type: string }
            example:
              shiftDate: "2026-04-07"
              startTime: "07:30"
              endTime: "17:00"
      responses:
        "201":
          description: Shift created
        "409":
          description: Shift already exists for this date

  # ─────────────────────────────────────────────────────────────
  # APPLICATIONS
  # ─────────────────────────────────────────────────────────────

  /jobs/{jobId}/apply:
    post:
      tags: [Applications]
      summary: Apply to a job
      description: |
        👷 **Worker**
        One application per worker per job (enforced by DB unique constraint).
        Job must have `status = open`.
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/JobIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                coverNote: { type: string, maxLength: 500 }
            example:
              coverNote: "Tôi có 5 năm kinh nghiệm thợ hồ, có thể bắt đầu ngay."
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              example:
                statusCode: 201
                data:
                  id: "uuid"
                  status: "pending"
                  appliedAt: "2026-03-21T10:00:00Z"
        "409":
          description: Already applied or job is full
          content:
            application/json:
              example:
                statusCode: 409
                message: "You have already applied to this job."
        "422":
          description: Job not open

  /worker/applications:
    get:
      tags: [Applications]
      summary: List own applications
      description: 👷 **Worker**
      security:
        - FirebaseBearer: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, accepted, rejected, withdrawn, expired]
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        "200":
          description: Application list
          content:
            application/json:
              example:
                statusCode: 200
                data:
                  - id: "uuid"
                    jobTitle: "Tuyển thợ hồ"
                    siteName: "Vinhomes Grand Park"
                    status: "accepted"
                    appliedAt: "2026-03-15T09:00:00Z"
                meta: { page: 1, limit: 20, total: 5, totalPages: 1 }

  /worker/applications/{applicationId}:
    delete:
      tags: [Applications]
      summary: Withdraw application
      description: |
        👷 **Worker** — own application only.
        Only allowed when `status = pending`.
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/ApplicationIdParam'
      responses:
        "200":
          description: Application withdrawn
          content:
            application/json:
              example:
                statusCode: 200
                data: { status: "withdrawn" }
        "409":
          description: Cannot withdraw — already accepted/rejected

  /manager/jobs/{jobId}/applications:
    get:
      tags: [Applications]
      summary: List applicants for a job
      description: 🏗️ **Manager** — own job only
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/JobIdParam'
        - name: status
          in: query
          schema: { type: string, enum: [pending, accepted, rejected] }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        "200":
          description: Applicant list
          content:
            application/json:
              example:
                statusCode: 200
                data:
                  - id: "uuid"
                    workerName: "Nguyễn Văn A"
                    workerUserId: "uuid"
                    status: "pending"
                    primaryTradeName: "Thợ hồ"
                    yearsOfExperience: 4
                    idDocumentStatus: "verified"
                    appliedAt: "2026-03-15T09:00:00Z"
                meta: { page: 1, limit: 20, total: 12, totalPages: 1 }

  /manager/applications/{applicationId}/accept:
    patch:
      tags: [Applications]
      summary: Accept applicant (hire)
      description: |
        🏗️ **Manager** — application must belong to own job.
        Creates `app.hires` record and queues contract generation job.
        Sends FCM notification to worker.
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/ApplicationIdParam'
      responses:
        "200":
          description: Application accepted; hire created
          content:
            application/json:
              example:
                statusCode: 200
                data:
                  applicationStatus: "accepted"
                  hireId: "uuid"
                  contractStatus: "pending"
        "409":
          description: Job headcount already filled

  /manager/applications/{applicationId}/reject:
    patch:
      tags: [Applications]
      summary: Reject applicant
      description: 🏗️ **Manager** — application must belong to own job
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/ApplicationIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                rejectionReason: { type: string, maxLength: 250 }
      responses:
        "200":
          description: Application rejected
          content:
            application/json:
              example:
                statusCode: 200
                data: { applicationStatus: "rejected" }

  # ─────────────────────────────────────────────────────────────
  # HIRES
  # ─────────────────────────────────────────────────────────────

  /worker/hires:
    get:
      tags: [Hires]
      summary: List own hires (worker view)
      description: 👷 **Worker**
      security:
        - FirebaseBearer: []
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [active, completed, cancelled, no_show] }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        "200":
          description: Hire list with contract status

  /manager/hires:
    get:
      tags: [Hires]
      summary: List hires for manager's jobs
      description: 🏗️ **Manager**
      security:
        - FirebaseBearer: []
      parameters:
        - name: jobId
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        "200":
          description: Hire list

  /manager/hires/{hireId}/cancel:
    patch:
      tags: [Hires]
      summary: Cancel a hire
      description: 🏗️ **Manager** — own hire only; `status` must be `active`
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/HireIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [cancellationReason]
              properties:
                cancellationReason: { type: string, maxLength: 500 }
            example:
              cancellationReason: "프로젝트 일정이 변경되었습니다."
      responses:
        "200":
          description: Hire cancelled; worker notified

  # ─────────────────────────────────────────────────────────────
  # ATTENDANCE
  # ─────────────────────────────────────────────────────────────

  /manager/jobs/{jobId}/attendance:
    get:
      tags: [Attendance]
      summary: Get attendance records for a job
      description: 🏗️ **Manager** — own job
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/JobIdParam'
        - name: date
          in: query
          required: true
          schema: { type: string, format: date, example: "2026-04-07" }
          description: "Returns all hired workers for the job and their attendance status for this date"
      responses:
        "200":
          description: Attendance list for the date
          content:
            application/json:
              example:
                statusCode: 200
                data:
                  date: "2026-04-07"
                  workers:
                    - hireId: "uuid"
                      workerUserId: "uuid"
                      workerName: "Nguyễn Văn A"
                      status: "present"
                      checkInTime: "07:35"
                      checkOutTime: null
                      hoursWorked: null
                      wageAmount: 450000

    put:
      tags: [Attendance]
      summary: Bulk upsert attendance records
      description: |
        🏗️ **Manager** — own job
        Upserts attendance for all provided workers for the given date.
        Existing records for the same (hireId, date) pair are overwritten.
        Past-date records: allowed on the same day only. Admin required for corrections on past days.
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/JobIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date, records]
              properties:
                date:
                  type: string
                  format: date
                  example: "2026-04-07"
                records:
                  type: array
                  items:
                    type: object
                    required: [hireId, status]
                    properties:
                      hireId:       { type: string, format: uuid }
                      status:       { type: string, enum: [present, absent, half_day, late, excused] }
                      checkInTime:  { type: string, example: "07:35", nullable: true }
                      checkOutTime: { type: string, example: "17:10", nullable: true }
                      hoursWorked:  { type: number, nullable: true, example: 9.5 }
                      notes:        { type: string, nullable: true }
            example:
              date: "2026-04-07"
              records:
                - hireId: "uuid-1"
                  status: "present"
                  checkInTime: "07:35"
                  checkOutTime: "17:10"
                  hoursWorked: 9.5
                - hireId: "uuid-2"
                  status: "absent"
      responses:
        "200":
          description: Attendance records saved
          content:
            application/json:
              example:
                statusCode: 200
                data:
                  savedCount: 2
                  date: "2026-04-07"
        "403":
          description: Past-date edit not allowed (admin only)
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

  # ─────────────────────────────────────────────────────────────
  # CONTRACTS
  # ─────────────────────────────────────────────────────────────

  /worker/contracts/{contractId}:
    get:
      tags: [Contracts]
      summary: Get contract detail and PDF URL (worker)
      description: |
        👷 **Worker** — own contract only.
        Returns presigned S3 URL valid for 15 minutes.
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/ContractIdParam'
      responses:
        "200":
          description: Contract detail
          content:
            application/json:
              example:
                statusCode: 200
                data:
                  id: "uuid"
                  status: "pending"
                  pdfUrl: "https://cdn.gada.vn/contracts/...?X-Amz-Expires=900"
                  signedPdfUrl: null
                  workerSignedAt: null
                  managerSignedAt: null
                  workerName: "Nguyễn Văn A"
                  jobTitle: "Tuyển thợ mộc"
                  siteName: "Vinhomes Grand Park"
                  wageAmount: 500000
                  startDate: "2026-04-01"
                  endDate: "2026-07-31"
                  issuedAt: "2026-03-21T10:00:00Z"

  /worker/contracts/{contractId}/sign:
    post:
      tags: [Contracts]
      summary: Worker signs contract
      description: |
        👷 **Worker** — own contract only.
        Requires that the worker has a current signature on file (`auth.signatures`).
        Updates contract status to `worker_signed`. Regenerates PDF with worker signature.
        Notifies manager.
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/ContractIdParam'
      responses:
        "200":
          description: Contract signed
          content:
            application/json:
              example:
                statusCode: 200
                data:
                  contractStatus: "worker_signed"
                  workerSignedAt: "2026-03-21T11:00:00Z"
        "409":
          description: Contract already signed or voided
          content:
            application/json:
              example:
                statusCode: 409
                message: "Contract already signed."
        "422":
          description: No signature on file
          content:
            application/json:
              example:
                statusCode: 422
                message: "Please add your signature in your profile before signing."

  /manager/contracts/{contractId}:
    get:
      tags: [Contracts]
      summary: Get contract detail (manager)
      description: 🏗️ **Manager** — contract must be for own job
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/ContractIdParam'
      responses:
        "200":
          description: Contract detail

  # ─────────────────────────────────────────────────────────────
  # NOTIFICATIONS
  # ─────────────────────────────────────────────────────────────

  /notifications:
    get:
      tags: [Notifications]
      summary: List notifications
      description: 🔐 **Authenticated**
      security:
        - FirebaseBearer: []
      parameters:
        - name: unreadOnly
          in: query
          schema: { type: boolean, default: false }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        "200":
          description: Notification list
          content:
            application/json:
              example:
                statusCode: 200
                data:
                  - id: "uuid"
                    type: "application_status"
                    title: "지원 결과"
                    body: "귀하의 지원이 수락되었습니다."
                    payload: { applicationId: "uuid", status: "accepted" }
                    readAt: null
                    createdAt: "2026-03-21T10:00:00Z"
                meta: { page: 1, limit: 20, total: 8, totalPages: 1, unreadCount: 3 }

  /notifications/{notificationId}/read:
    patch:
      tags: [Notifications]
      summary: Mark notification as read
      description: 🔐 **Authenticated** — own notification only
      security:
        - FirebaseBearer: []
      parameters:
        - name: notificationId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Marked as read

  /notifications/read-all:
    post:
      tags: [Notifications]
      summary: Mark all notifications as read
      description: 🔐 **Authenticated**
      security:
        - FirebaseBearer: []
      responses:
        "200":
          description: All notifications marked read
          content:
            application/json:
              example:
                statusCode: 200
                data: { updatedCount: 5 }

  # ─────────────────────────────────────────────────────────────
  # DEVICES (FCM Token)
  # ─────────────────────────────────────────────────────────────

  /devices/fcm-token:
    put:
      tags: [Devices]
      summary: Register or refresh FCM push token
      description: |
        🔐 **Authenticated**
        Upserts the device token for push notifications.
        Called on app launch and when Firebase refreshes the token.
      security:
        - FirebaseBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, platform]
              properties:
                token:    { type: string, description: "Firebase Cloud Messaging device token" }
                platform: { type: string, enum: [ios, android, web], example: android }
            example:
              token: "fcm-token-abc123..."
              platform: "android"
      responses:
        "200":
          description: Token registered

    delete:
      tags: [Devices]
      summary: Remove FCM token (on logout)
      description: 🔐 **Authenticated**
      security:
        - FirebaseBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200":
          description: Token removed

  # ─────────────────────────────────────────────────────────────
  # ADMIN
  # ─────────────────────────────────────────────────────────────

  /admin/manager-approvals:
    get:
      tags: [Admin]
      summary: List manager approval queue
      description: 🛡️ **Admin**
      security:
        - FirebaseBearer: []
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [pending, approved, rejected], default: pending }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        "200":
          description: Approval queue
          content:
            application/json:
              example:
                statusCode: 200
                data:
                  - id: "uuid"
                    requesterName: "Trần Văn B"
                    requesterPhone: "+84912345678"
                    businessName: "Xây dựng Hưng Phát"
                    businessRegistrationNumber: "0123456789"
                    submittedAt: "2026-03-20T09:00:00Z"
                    status: "pending"

  /admin/manager-approvals/{approvalId}:
    get:
      tags: [Admin]
      summary: Get approval detail with document URL
      description: 🛡️ **Admin**
      security:
        - FirebaseBearer: []
      parameters:
        - name: approvalId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Approval detail
          content:
            application/json:
              example:
                statusCode: 200
                data:
                  id: "uuid"
                  businessName: "Xây dựng Hưng Phát"
                  representativeName: "Trần Văn B"
                  businessDocUrl: "https://cdn.gada.vn/business-docs/...?X-Amz-Expires=900"
                  status: "pending"
                  requester:
                    id: "uuid"
                    name: "Trần Văn B"
                    phone: "+84912345678"
                    email: "tranb@example.com"

  /admin/manager-approvals/{approvalId}/approve:
    patch:
      tags: [Admin]
      summary: Approve manager registration
      description: |
        🛡️ **Admin**
        Sets `manager_profiles.approval_status = approved`.
        Inserts `auth.user_roles` row with `role = manager`.
        Sends FCM + in-app notification to user.
      security:
        - FirebaseBearer: []
      parameters:
        - name: approvalId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reviewNote: { type: string }
      responses:
        "200":
          description: Manager approved
          content:
            application/json:
              example:
                statusCode: 200
                data:
                  approvalStatus: "approved"
                  managerUserId: "uuid"

  /admin/manager-approvals/{approvalId}/reject:
    patch:
      tags: [Admin]
      summary: Reject manager registration
      description: |
        🛡️ **Admin**
        Sets `approval_status = rejected`. Rejection reason is required.
        Sends FCM + in-app notification to user.
      security:
        - FirebaseBearer: []
      parameters:
        - name: approvalId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rejectionReason]
              properties:
                rejectionReason: { type: string, example: "사업자등록증이 불분명합니다." }
            example:
              rejectionReason: "사업자등록증이 불분명합니다."
      responses:
        "200":
          description: Registration rejected

  /admin/users:
    get:
      tags: [Admin]
      summary: List all users
      description: 🛡️ **Admin**
      security:
        - FirebaseBearer: []
      parameters:
        - name: search
          in: query
          schema: { type: string }
          description: Search by name, email, or phone
        - name: role
          in: query
          schema: { type: string, enum: [worker, manager, admin] }
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        "200":
          description: Paginated user list

  /admin/users/{userId}:
    get:
      tags: [Admin]
      summary: Get user detail
      description: 🛡️ **Admin**
      security:
        - FirebaseBearer: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: User detail with roles, profile, and recent activity

    delete:
      tags: [Admin]
      summary: Soft-delete user account
      description: |
        🛡️ **Admin**
        Sets `deleted_at`, `is_active = false`. Disables Firebase account.
        Does not hard-delete; GDPR data purge is a separate async job.
      security:
        - FirebaseBearer: []
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        "200":
          description: User soft-deleted
        "403":
          description: Cannot delete admin accounts via this endpoint

  /admin/sites/{siteId}/deactivate:
    patch:
      tags: [Admin]
      summary: Deactivate any site
      description: 🛡️ **Admin**
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/SiteIdParam'
      responses:
        "200":
          description: Site deactivated

  /admin/jobs/{jobId}/close:
    patch:
      tags: [Admin]
      summary: Force-close any job
      description: 🛡️ **Admin**
      security:
        - FirebaseBearer: []
      parameters:
        - $ref: '#/components/parameters/JobIdParam'
      responses:
        "200":
          description: Job closed

  /admin/translations:
    get:
      tags: [Admin]
      summary: Get all i18n translations
      description: 🛡️ **Admin**
      security:
        - FirebaseBearer: []
      parameters:
        - name: locale
          in: query
          schema: { type: string, enum: [ko, vi, en] }
        - name: search
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Translation key-value pairs
          content:
            application/json:
              example:
                statusCode: 200
                data:
                  - key: "jobs.apply_button"
                    ko: "지원하기"
                    vi: "Ứng tuyển"
                    en: "Apply"
                  - key: "jobs.wage_per_day"
                    ko: "일급"
                    vi: "Lương ngày"
                    en: "Daily wage"

    put:
      tags: [Admin]
      summary: Update i18n translations (batch)
      description: 🛡️ **Admin**
      security:
        - FirebaseBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [translations]
              properties:
                translations:
                  type: array
                  items:
                    type: object
                    required: [key, locale, value]
                    properties:
                      key:    { type: string, example: "jobs.apply_button" }
                      locale: { type: string, enum: [ko, vi, en] }
                      value:  { type: string, example: "Ứng tuyển ngay" }
            example:
              translations:
                - key: "jobs.apply_button"
                  locale: "vi"
                  value: "Ứng tuyển ngay"
      responses:
        "200":
          description: Translations updated
          content:
            application/json:
              example:
                statusCode: 200
                data: { updatedCount: 1 }
